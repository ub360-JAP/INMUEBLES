<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>INMUEBLES UB</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --primary: #1d4ed8;
      --primary-dark: #1e40af;
      --danger: #dc2626;
      --border: #dbe3ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.35), transparent 35%),
        linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #020617 100%);
      color: var(--text);
    }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #e0ecff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .field-row {
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.14);
    }

    button {
      min-height: 48px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .error {
      display: none;
      margin-top: 12px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 700;
    }

    .success {
      display: none;
      margin-top: 12px;
      color: #15803d;
      font-size: 14px;
      font-weight: 700;
    }

    .tour-screen {
      display: none;
      min-height: 100vh;
      background: #020617;
    }

    .projects-screen {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .projects-card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    .project-list {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .project-button {
      width: 100%;
      min-height: 58px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f8fafc;
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
      text-align: left;
      white-space: normal;
    }

    .project-button:hover {
      border-color: var(--primary);
      background: #e0ecff;
      color: var(--primary-dark);
    }

    .project-name {
      display: block;
    }

    .project-code {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .tour-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.94);
      color: white;
      backdrop-filter: blur(8px);
    }

    .tour-brand {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .home-button {
      min-height: auto;
      padding: 9px 13px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.12);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .home-button:hover {
      background: rgba(29, 78, 216, 0.92);
    }

    .iframe-wrap {
      width: 100%;
      height: 100vh;
      padding-top: 56px;
      background: #000;
    }

    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 56px);
      border: 0;
      background: #000;
    }

    @media (max-width: 520px) {
      .login-card {
        padding: 24px;
      }

      .field-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="login-screen" id="loginScreen">
    <section class="login-card">
      <span class="badge">Acceso restringido</span>
      <h1>INMUEBLES UB</h1>
      <p>Ingrese la clave autorizada para acceder al recorrido virtual correspondiente.</p>

      <form id="accessForm">
        <label for="password">Clave de acceso</label>
        <div class="field-row">
          <input id="password" type="password" autocomplete="off" placeholder="Escriba la clave" />
          <button type="submit">Ingresar</button>
        </div>
        <div class="error" id="errorMessage">Acceso denegado. Intente nuevamente.</div>
        <div class="success" id="successMessage">Acceso autorizado. Redirigiendo...</div>
      </form>
    </section>
  </main>

  <main class="projects-screen" id="projectsScreen">
    <section class="projects-card">
      <span class="badge">Panel administrador</span>
      <h1>INMUEBLES UB</h1>
      <p>Seleccione el proyecto que desea visualizar.</p>

      <div class="project-list" id="projectList">
      </div>
    </section>
  </main>

  <main class="tour-screen" id="tourScreen">
    <header class="tour-header">
      <div class="tour-brand">INMUEBLES UB</div>
      <button class="home-button" type="button" id="homeButton">MENÚ PRINCIPAL</button>
    </header>

    <div class="iframe-wrap">
      <iframe
        id="tour-embeded"
        name="C25C - Galpon"
        frameborder="0"
        width="100%"
        height="400px"
        scrolling="no"
        allowvr="yes"
        allow="vr; xr; accelerometer; gyroscope; autoplay;"
        allowfullscreen="false"
        webkitallowfullscreen="false"
        mozallowfullscreen="false"
        loading="eager">
      </iframe>
    </div>
  </main>

  <script>
    const CLAVE_ADMIN = "ADMINJC";

    const proyectos = {
      "UB7B123": {
        nombre: "Edif. Madidi - Departamento 7B",
        link: "https://tour.panoee.net/iframe/6a3055bdd3b4412c7ce463cf"
      },
      "UB7D123": {
        nombre: "Edif. Madidi - Departamento 7D",
        link: "https://tour.panoee.net/iframe/6a2887d7c640447d070ee839"
      },
      "UB7A123": {
        nombre: "Edif. Madidi - Departamento 7A",
        link: "https://tour.panoee.net/iframe/6a2abef62831000b3274fba3"
      },
      "UB6B123": {
        nombre: "Edif. Madidi - Departamento 6B",
        link: "https://tour.panoee.net/iframe/6a340f6cd0e5ab5c7801fc9a"
      },
      "UBPA123": {
        nombre: "Edif. Madidi - Parrillero A y B",
        link: "https://tour.panoee.net/iframe/6a2ae42c9c1006e37aaa1684"
      },
      "UBC22L23": {
        nombre: "Edif. CEC - Local 2 y 3 Subsuelo",
        link: "https://tour.panoee.net/iframe/6a2aa9c7283100fe6174f8a5"
      },
      "UBC20LA": {
        nombre: "Edif. Union - Subsuelo A",
        link: "https://tour.panoee.net/iframe/6a2adef0283100161f7500bc"
      },
      "UBC25GA": {
        nombre: "C25C - Galpón",
        link: "https://tour.panoee.net/iframe/6a3419db7fd6bf833ca74982"
      },
      "UBKAN26": {
        nombre: "Poryecto Kantutas",
        link: "https://tour.panoee.net/iframe/6a5b9150fee51873df7dd7fd"
      },
      "UBCGS26": {
        nombre: "C22 CEC CGS",
        link: "https://tour.panoee.net/iframe/6a60d906d175b08983c203ca"
      }
    };

    const accessForm = document.getElementById("accessForm");
    const passwordInput = document.getElementById("password");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");
    const loginScreen = document.getElementById("loginScreen");
    const projectsScreen = document.getElementById("projectsScreen");
    const projectList = document.getElementById("projectList");
    const tourScreen = document.getElementById("tourScreen");
    const tourFrame = document.getElementById("tour-embeded");
    const homeButton = document.getElementById("homeButton");

    function renderizarListaProyectos() {
      projectList.innerHTML = "";

      Object.entries(proyectos).forEach(function ([clave, proyecto]) {
        const button = document.createElement("button");
        button.className = "project-button";
        button.type = "button";
        button.dataset.project = clave;
        button.innerHTML = `
          <span class="project-name">${proyecto.nombre}</span>
          <span class="project-code">Clave: ${clave}</span>
        `;

        button.addEventListener("click", function () {
          mostrarRecorrido(proyecto);
        });

        projectList.appendChild(button);
      });
    }

    function mostrarInicio() {
      tourFrame.removeAttribute("src");
      projectsScreen.style.display = "none";
      tourScreen.style.display = "none";
      loginScreen.style.display = "flex";
      successMessage.style.display = "none";
      errorMessage.style.display = "none";
      passwordInput.value = "";
      passwordInput.focus();
      window.history.replaceState({ pantalla: "inicio" }, "", window.location.pathname);
    }

    function mostrarListaProyectos() {
      renderizarListaProyectos();
      loginScreen.style.display = "none";
      tourScreen.style.display = "none";
      projectsScreen.style.display = "flex";
      window.history.pushState({ pantalla: "proyectos" }, "", window.location.pathname);
    }

    function mostrarRecorrido(proyecto) {
      tourFrame.name = proyecto.nombre;
      tourFrame.src = proyecto.link;
      loginScreen.style.display = "none";
      projectsScreen.style.display = "none";
      tourScreen.style.display = "block";
      window.history.pushState({ pantalla: "recorrido" }, "", window.location.pathname);
    }

    accessForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const claveIngresada = passwordInput.value.trim().toUpperCase();
      const proyecto = proyectos[claveIngresada];

      if (claveIngresada === CLAVE_ADMIN) {
        errorMessage.style.display = "none";
        successMessage.style.display = "block";

        setTimeout(function () {
          mostrarListaProyectos();
        }, 400);
      } else if (proyecto) {
        errorMessage.style.display = "none";
        successMessage.style.display = "block";

        setTimeout(function () {
          mostrarRecorrido(proyecto);
        }, 600);
      } else {
        successMessage.style.display = "none";
        errorMessage.style.display = "block";
        passwordInput.value = "";
        passwordInput.focus();
      }
    });

    function mostrarMenuPrincipal() {
      tourFrame.removeAttribute("src");
      renderizarListaProyectos();
      loginScreen.style.display = "none";
      tourScreen.style.display = "none";
      projectsScreen.style.display = "flex";
      window.history.replaceState({ pantalla: "proyectos" }, "", window.location.pathname);
      window.scrollTo(0, 0);
    }

    homeButton.addEventListener("click", mostrarMenuPrincipal);

    window.addEventListener("popstate", function () {
      mostrarInicio();
    });

    var pano_iframe_name = "tour-embeded";
    window.addEventListener("devicemotion", function (e) {
      var iframe = document.getElementById(pano_iframe_name);
      if (iframe) {
        iframe.contentWindow.postMessage({
          type: "devicemotion",
          deviceMotionEvent: {
            acceleration: {
              x: e.acceleration ? e.acceleration.x : null,
              y: e.acceleration ? e.acceleration.y : null,
              z: e.acceleration ? e.acceleration.z : null
            },
            accelerationIncludingGravity: {
              x: e.accelerationIncludingGravity ? e.accelerationIncludingGravity.x : null,
              y: e.accelerationIncludingGravity ? e.accelerationIncludingGravity.y : null,
              z: e.accelerationIncludingGravity ? e.accelerationIncludingGravity.z : null
            },
            rotationRate: {
              alpha: e.rotationRate ? e.rotationRate.alpha : null,
              beta: e.rotationRate ? e.rotationRate.beta : null,
              gamma: e.rotationRate ? e.rotationRate.gamma : null
            },
            interval: e.interval,
            timeStamp: e.timeStamp
          }
        }, "*");
      }
    });
  </script>
</body>
</html>
