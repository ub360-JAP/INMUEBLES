<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>INMUEBLES UB</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --primary: #1d4ed8;
      --primary-dark: #1e40af;
      --danger: #dc2626;
      --border: #dbe3ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.35), transparent 35%),
        linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #020617 100%);
      color: var(--text);
    }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #e0ecff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .field-row {
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.14);
    }

    button {
      min-height: 48px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .error {
      display: none;
      margin-top: 12px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 700;
    }

    .success {
      display: none;
      margin-top: 12px;
      color: #15803d;
      font-size: 14px;
      font-weight: 700;
    }

    @media (max-width: 520px) {
      .login-card {
        padding: 24px;
      }

      .field-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="login-screen" id="loginScreen">
    <section class="login-card">
      <span class="badge">Acceso restringido</span>
      <h1>INMUEBLES UB</h1>
      <p>Ingrese la clave autorizada para acceder al recorrido virtual correspondiente.</p>

      <form id="accessForm">
        <label for="password">Clave de acceso</label>
        <div class="field-row">
          <input id="password" type="password" autocomplete="off" placeholder="Escriba la clave" />
          <button type="submit">Ingresar</button>
        </div>
        <div class="error" id="errorMessage">Acceso denegado. Intente nuevamente.</div>
        <div class="success" id="successMessage">Acceso autorizado. Redirigiendo...</div>
      </form>
    </section>
  </main>

  <script>
    const recorridos = {
      "UB6B123": "https://tour.panoee.net/6a3419db7fd6bf833ca74982",
      "UB7B123": "https://tour.panoee.net/6a3055bdd3b4412c7ce463cf",
      "UBL23C20": "https://tour.panoee.net/6a2aa9c7283100fe6174f8a5"
    };

    const accessForm = document.getElementById("accessForm");
    const passwordInput = document.getElementById("password");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");

    accessForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const claveIngresada = passwordInput.value.trim();
      const linkRecorrido = recorridos[claveIngresada];

      if (linkRecorrido) {
        errorMessage.style.display = "none";
        successMessage.style.display = "block";

        setTimeout(function () {
          window.location.href = linkRecorrido;
        }, 600);
      } else {
        successMessage.style.display = "none";
        errorMessage.style.display = "block";
        passwordInput.value = "";
        passwordInput.focus();
      }
    });
  </script>
</body>
</html>
